name: GamuCare CI

on:
  push:
    branches: [main, develop]
    tags: ['v*']
  pull_request:
    branches: [main, develop]
  workflow_dispatch:

concurrency:
  group: gamucare-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      DATABASE_URL: 'sqlite+pysqlite:///:memory:'
      CORS_ORIGINS: '["http://localhost:8080"]'
      JWT_SECRET: 'ci-only-secret-with-more-than-thirty-two-characters'
      LOG_FILE: ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - run: pip install -r requirements.txt
      - run: mkdir -p ../data/reports
      - name: Tests and coverage gate
        run: >-
          PYTHONPATH=. pytest -q
          --junitxml=../data/reports/junit.xml
          --cov=app
          --cov-report=xml:../data/reports/coverage.xml
          --cov-report=term-missing
          --cov-fail-under=55
      - name: Compile Python modules
        run: python -m compileall -q app tests
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-quality-reports
          path: |
            data/reports/junit.xml
            data/reports/coverage.xml

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist

  compose-validation:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: cp .env.example .env
      - name: Validate base and monitoring profiles
        run: |
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml config --quiet
          docker compose -f docker-compose.yml -f docker-compose.gpu.yml --profile monitoring config --quiet


  powershell-quality:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate PowerShell syntax
        shell: pwsh
        run: |
          $failed = 0
          Get-ChildItem scripts -Filter *.ps1 | ForEach-Object {
            $tokens = $null
            $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile($_.FullName, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              Write-Error ("{0}: {1}" -f $_.Name, (($errors | ForEach-Object Message) -join '; '))
              $failed += 1
            }
          }
          if ($failed -gt 0) { exit 1 }

  docker-build:
    runs-on: ubuntu-latest
    needs: [backend-quality, frontend-quality, compose-validation, powershell-quality]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: gamucare-api:${{ github.sha }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api
      - name: Build web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: false
          tags: gamucare-web:${{ github.sha }}
          build-args: VITE_API_URL=/api/v1
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web

  publish-images:
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [docker-build]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Publish API image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/api:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/api:latest
          provenance: mode=max
          sbom: true
      - name: Publish web image
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          push: true
          build-args: VITE_API_URL=/api/v1
          tags: |
            ghcr.io/${{ github.repository }}/web:${{ github.ref_name }}
            ghcr.io/${{ github.repository }}/web:latest
          provenance: mode=max
          sbom: true
